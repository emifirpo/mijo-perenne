<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo verde pampa con esquinas redondeadas -->
  <rect width="64" height="64" rx="14" fill="#005F02"/>

  <!-- LogoMark — 7 rayos trapezoidales + 2 franjas de la pampa -->
  <!-- viewBox original: 44 30 112 92 → escalar a 64×64 con margen 6px -->
  <!-- factor x: (64-12)/112 = 0.4643, offset x: 6 - 44*0.4643 = -14.42 -->
  <!-- factor y: (64-12)/92  = 0.5652, offset y: 6 - 30*0.5652 = -10.96 -->
  <g transform="translate(-14.42,-10.96) scale(0.4643,0.5652)">
    <!-- 7 rayos trapezoidales -->
    <polygon points="97.35,95.64 64.70,79.33 77.05,62.35 102.65,88.36" fill="#F0EBE1"/>
    <polygon points="96.36,94.65 64.47,60.96 81.46,48.61 103.64,89.35" fill="#F0EBE1"/>
    <polygon points="95.72,93.39 73.64,44.84 93.61,38.35 104.28,90.61" fill="#F0EBE1"/>
    <polygon points="95.50,92.00 89.50,34.00 110.50,34.00 104.50,92.00" fill="#F0EBE1"/>
    <polygon points="95.72,90.61 106.39,38.35 126.36,44.84 104.28,93.39" fill="#F0EBE1"/>
    <polygon points="96.36,89.35 118.54,48.61 135.53,60.96 103.64,94.65" fill="#F0EBE1"/>
    <polygon points="97.35,88.36 122.95,62.35 135.30,79.33 102.65,95.64" fill="#F0EBE1"/>
    <!-- Franja superior — horizonte pampeano -->
    <path d="M 52,98 Q 76,89 100,93 Q 124,97 148,88 L 148,95 Q 124,104 100,100 Q 76,96 52,105 Z" fill="#F0EBE1"/>
    <!-- Franja inferior — suelo -->
    <path d="M 48,110 Q 74,100 100,105 Q 126,110 152,100 L 152,108 Q 126,118 100,113 Q 74,108 48,118 Z" fill="#F0EBE1"/>
  </g>
</svg>
