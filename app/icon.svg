<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo verde pampa con esquinas redondeadas -->
  <rect width="64" height="64" rx="14" fill="#005F02"/>

  <!-- Panícula de mijo perenne — 5 brazos desde el centro (32, 35) -->

  <!-- Brazo izquierdo exterior (−50°, 14px) -->
  <rect x="-4" y="-14" width="8" height="14" rx="4"
    fill="#F0EBE1" transform="translate(32,35) rotate(-50)"/>

  <!-- Brazo izquierdo interior (−24°, 18px) -->
  <rect x="-4" y="-18" width="8" height="18" rx="4"
    fill="#F0EBE1" transform="translate(32,35) rotate(-24)"/>

  <!-- Brazo central (0°, 22px) — el más alto -->
  <rect x="-4" y="-22" width="8" height="22" rx="4"
    fill="#F0EBE1" transform="translate(32,35) rotate(0)"/>

  <!-- Brazo derecho interior (+24°, 18px) -->
  <rect x="-4" y="-18" width="8" height="18" rx="4"
    fill="#F0EBE1" transform="translate(32,35) rotate(24)"/>

  <!-- Brazo derecho exterior (+50°, 14px) -->
  <rect x="-4" y="-14" width="8" height="14" rx="4"
    fill="#F0EBE1" transform="translate(32,35) rotate(50)"/>

  <!-- Nodo central -->
  <circle cx="32" cy="35" r="4.5" fill="#F0EBE1"/>

  <!-- Tallo -->
  <rect x="28.5" y="35" width="7" height="13" rx="3.5" fill="#F0EBE1"/>
</svg>
