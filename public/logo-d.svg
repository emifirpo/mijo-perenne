<svg viewBox="0 0 200 190" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sandro Grand — Semilla de Mijo Perenne">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&amp;family=DM+Sans:wght@500&amp;display=swap');</style>
  </defs>

  <!-- ──────────────────────────────────────────────────────
       MARK — Panícula del mijo sobre el horizonte pampeano

       7 rayos trapezoidales (angostos en base, anchos arriba)
       = las ramas de la panícula del mijo perenne abierta.
       2 franjas curvas en la base = el horizonte de la pampa,
       la tierra donde la planta crece año tras año.

       Los rayos se dibujan primero; las franjas los cubren
       en la base, creando la ilusión de que emergen del suelo.
  ─────────────────────────────────────────────────────── -->

  <!-- Rayo 1: −54°, externo izquierdo -->
  <polygon points="97.35,95.64 64.70,79.33 77.05,62.35 102.65,88.36" fill="#005F02"/>
  <!-- Rayo 2: −36° -->
  <polygon points="96.36,94.65 64.47,60.96 81.46,48.61 103.64,89.35" fill="#005F02"/>
  <!-- Rayo 3: −18° -->
  <polygon points="95.72,93.39 73.64,44.84 93.61,38.35 104.28,90.61" fill="#005F02"/>
  <!-- Rayo 4: 0° — eje central, más alto -->
  <polygon points="95.50,92.00 89.50,34.00 110.50,34.00 104.50,92.00" fill="#005F02"/>
  <!-- Rayo 5: +18° -->
  <polygon points="95.72,90.61 106.39,38.35 126.36,44.84 104.28,93.39" fill="#005F02"/>
  <!-- Rayo 6: +36° -->
  <polygon points="96.36,89.35 118.54,48.61 135.53,60.96 103.64,94.65" fill="#005F02"/>
  <!-- Rayo 7: +54°, externo derecho -->
  <polygon points="97.35,88.36 122.95,62.35 135.30,79.33 102.65,95.64" fill="#005F02"/>

  <!-- Franja superior — horizonte alto, hierba alta -->
  <path d="M 52,98  Q 76,89  100,93  Q 124,97  148,88
           L 148,95  Q 124,104 100,100 Q  76,96   52,105 Z"
        fill="#005F02"/>

  <!-- Franja inferior — tierra, suelo de la pampa -->
  <path d="M 48,110 Q 74,100 100,105 Q 126,110 152,100
           L 152,108 Q 126,118 100,113 Q  74,108  48,118 Z"
        fill="#005F02"/>

  <!-- ──────────────────────────────────────────────────────
       WORDMARK
  ─────────────────────────────────────────────────────── -->
  <text
    x="100" y="143"
    text-anchor="middle"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="18"
    font-weight="700"
    fill="#005F02"
    letter-spacing="3.5">SANDRO GRAND</text>

  <text
    x="100" y="161"
    text-anchor="middle"
    font-family="'DM Sans', Arial, sans-serif"
    font-size="6.5"
    font-weight="500"
    fill="#B3A86A"
    letter-spacing="1.9">SEMILLA DE MIJO PERENNE</text>

</svg>
