<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky01" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#010602"/>
      <stop offset="55%" stop-color="#041008"/>
      <stop offset="100%" stop-color="#071a0c"/>
    </linearGradient>
    <radialGradient id="glow01" cx="48%" cy="78%" r="55%">
      <stop offset="0%" stop-color="#7a5510" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7a5510" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="72%" cy="18%" r="12%">
      <stop offset="0%" stop-color="#c4a84a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c4a84a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="900" height="600" fill="url(#sky01)"/>
  <rect width="900" height="600" fill="url(#glow01)"/>
  <rect width="900" height="600" fill="url(#moonGlow)"/>

  <!-- Stars -->
  <circle cx="80"  cy="55"  r="1"   fill="white" opacity="0.25"/>
  <circle cx="155" cy="38"  r="0.8" fill="white" opacity="0.2"/>
  <circle cx="240" cy="70"  r="1.2" fill="white" opacity="0.3"/>
  <circle cx="320" cy="30"  r="0.8" fill="white" opacity="0.18"/>
  <circle cx="410" cy="58"  r="1"   fill="white" opacity="0.22"/>
  <circle cx="500" cy="42"  r="0.8" fill="white" opacity="0.2"/>
  <circle cx="580" cy="75"  r="1"   fill="white" opacity="0.28"/>
  <circle cx="650" cy="28"  r="0.7" fill="white" opacity="0.15"/>
  <circle cx="730" cy="52"  r="1"   fill="white" opacity="0.22"/>
  <circle cx="810" cy="38"  r="0.8" fill="white" opacity="0.2"/>
  <circle cx="860" cy="68"  r="1.2" fill="white" opacity="0.25"/>
  <circle cx="190" cy="110" r="0.7" fill="white" opacity="0.12"/>
  <circle cx="460" cy="95"  r="0.8" fill="white" opacity="0.15"/>
  <circle cx="700" cy="115" r="0.6" fill="white" opacity="0.12"/>

  <!-- Moon -->
