  <circle cx="648" cy="72" r="14" fill="#d4b85a" opacity="0.1"/>

  <!-- Horizon glow line -->
  <rect x="0" y="410" width="900" height="2" fill="rgba(179,140,40,0.06)"/>

  <!-- Ground -->
  <rect y="412" width="900" height="188" fill="#030b04"/>

  <!-- Distant cattle silhouettes (very subtle) -->
  <rect x="320" y="402" width="22" height="9"  rx="3" fill="#020804" opacity="0.9"/>
  <rect x="355" y="404" width="18" height="7"  rx="2" fill="#020804" opacity="0.9"/>
  <rect x="390" y="401" width="25" height="10" rx="3" fill="#020804" opacity="0.9"/>
