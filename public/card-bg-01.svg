  <path d="M 688,412 Q 691,370 685,338" stroke="#7a5c1a" stroke-width="1.2" fill="none" opacity="0.42"/>

  <!-- Far right -->
  <path d="M 790,412 Q 786,368 792,330" stroke="#8a6820" stroke-width="1.4" fill="none" opacity="0.48"/>
  <path d="M 805,412 Q 808,382 802,354" stroke="#7a5c1a" stroke-width="1.2" fill="none" opacity="0.4"/>
  <path d="M 820,412 Q 816,360 822,315" stroke="#6e5215" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 835,412 Q 838,374 832,345" stroke="#8a6820" stroke-width="1.3" fill="none" opacity="0.45"/>
